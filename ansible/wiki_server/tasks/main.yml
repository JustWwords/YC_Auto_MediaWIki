# Настройка PostgreSQL
- name: Создание базы данных PostgreSQL
  community.postgresql.postgresql_db:
    name: my_wiki
    state: present
    login_user: postgres
  become: true
  become_user: postgres

- name: Создание пользователя PostgreSQL
  community.postgresql.postgresql_user:
    name: wikiuser
    password: "pass123"
    db: my_wiki
    priv: "ALL"
    state: present
    login_user: postgres
  become: true
  become_user: postgres

- name: Изменение владельца Базы Данных
  community.postgresql.postgresql_db:
    name: my_wiki
    owner: wikiuser
    state: present
  become: true
  become_user: postgres


# sudo ln -s /var/lib/mediawiki /var/www/html/mediawiki
- name: Создание символической ссылки для MediaWiki
  ansible.builtin.file:
    src: /var/lib/mediawiki
    dest: /var/www/html/mediawiki 
    state: link
  become: true

- name: Ссылка
  ansible.builtin.debug:
    msg: "Ссылка на главную MediaWiki: http://{{item['ansible_host']}}/mediawiki/mediawiki-1.46.0/"
  loop: 
    - "{{ hostvars }}"