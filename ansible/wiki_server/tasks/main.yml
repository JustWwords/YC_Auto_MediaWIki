---
- name: Установка стандартных пакетов
  become: true
  apt:
    name: "{{ item }}"
    state: present
    update_cache: true
    lock_timeout: 300
  loop: 
    - "{{ packages_to_install }}"

# Скачивание и установка Wiki
- name: Скачивание MediaWiki
  ansible.builtin.get_url:
    url: https://releases.wikimedia.org/mediawiki/1.46/mediawiki-1.46.0.tar.gz
    dest: /tmp/MediaWiki.tar.gz

- name: Создание директории сервера MediaWiki
  ansible.builtin.file:
    path: /var/lib/mediawiki
    state: directory

- name: Извлечение архива MediaWiki
  become: true
  ansible.builtin.unarchive:
    src: /tmp/MediaWiki.tar.gz
    dest: /var/lib/mediawiki
    remote_src: true


